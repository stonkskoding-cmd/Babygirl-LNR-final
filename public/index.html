<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BABYGIRL_LNR</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #e91e63; --secondary: #9c27b0; --bg: #0a0a0f; --card-bg: rgba(255,255,255,0.05); --text: #fff; --text-muted: rgba(255,255,255,0.6); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; }
    #video-bg { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; opacity: 0.3; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, transparent 0%, #000 100%); z-index: -1; pointer-events: none; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links button { background: none; border: none; color: var(--text); margin-left: 1.5rem; cursor: pointer; font-size: 1rem; }
    .nav-links button:hover { color: var(--primary); }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
    .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; cursor: pointer; }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; height: 350px; object-fit: cover; }
    .card-body { padding: 1rem; }
    .card-title { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--primary); }
    .card-text { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .tag { background: rgba(255,255,255,0.1); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; }
    .btn { width: 100%; padding: 0.8rem; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 600; cursor: pointer; }
    .filters { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.5rem 1.5rem; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; border-radius: 20px; cursor: pointer; }
    .filter-btn.active, .filter-btn:hover { background: var(--primary); border-color: var(--primary); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-content { background: #1a1a2e; padding: 2rem; border-radius: 15px; width: 90%; max-width: 500px; position: relative; max-height: 90vh; overflow-y: auto; }
    .close-modal { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
    .profile-modal-img { width: 100%; height: 400px; object-fit: cover; border-radius: 10px; margin-bottom: 1rem; }
    .profile-photo-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
    .gallery-photo { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; }
    .profile-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .stat-item { background: rgba(255,255,255,0.05); padding: 0.8rem; border-radius: 8px; text-align: center; }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); }
    .stat-value { font-weight: 600; color: var(--primary); }
    .chat-container { max-width: 800px; margin: 0 auto; background: rgba(0,0,0,0.5); border-radius: 15px; height: 70vh; display: flex; flex-direction: column; }
    .chat-messages { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
    .chat-msg { max-width: 80%; padding: 0.8rem 1.2rem; border-radius: 15px; line-height: 1.4; word-wrap: break-word; }
    .chat-msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-bottom-right-radius: 2px; }
    .chat-msg.bot { align-self: flex-start; background: rgba(255,255,255,0.1); border-bottom-left-radius: 2px; }
    .chat-msg.system { align-self: center; background: transparent; color: var(--text-muted); font-size: 0.8rem; text-align: center; }
    .chat-input-area { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 0.5rem; }
    .chat-input { flex: 1; padding: 0.8rem; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .admin-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 0.5rem 1rem; }
    .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
    .form-control { width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; }
    .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.05); margin-bottom: 0.5rem; border-radius: 8px; }
    .item-actions button { margin-left: 0.5rem; padding: 0.4rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; color: white; }
    .btn-edit { background: #2196F3; }
    .btn-delete { background: #F44336; }
    .chat-item { background: rgba(255,255,255,0.05); padding: 1rem; margin-bottom: 0.5rem; border-radius: 8px; cursor: pointer; }
    .chat-item:hover { background: rgba(255,255,255,0.1); }
    .chat-item.new-message { border-left: 3px solid var(--primary); }
    .chat-item-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .status { font-size: 0.8rem; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .status.waiting { background: #FF9800; color: black; }
    .status.active { background: #4CAF50; color: white; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 1rem 2rem; border-radius: 8px; animation: fadeIn 0.3s; z-index: 2000; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    #ageModal .modal-content { text-align: center; }
    .age-btn { margin: 1rem; padding: 1rem 2rem; font-size: 1.2rem; }
    .age-btn.yes { background: var(--primary); }
    .age-btn.no { background: #555; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .nav-links { display: none; } }
  </style>
</head>
<body>
  <video id="video-bg" autoplay muted loop><source src="video/bg.mp4" type="video/mp4"></video>
  <div class="overlay"></div>

  <nav>
    <div class="logo">BABYGIRL_LNR</div>
    <div class="nav-links">
      <button onclick="navigateTo('home')">Главная</button>
      <button onclick="navigateTo('chat')">Чат</button>
      <button id="authBtn" onclick="toggleAuth()">Войти</button>
      <button id="adminBtn" style="display:none;" onclick="navigateTo('admin')">Админка</button>
      <button id="logoutBtn" style="display:none;" onclick="logout()">Выход</button>
    </div>
  </nav>

  <div class="container">
    <div id="homeSection">
      <div class="filters">
        <button class="filter-btn active" onclick="filterGirls('all')">Все</button>
        <button class="filter-btn" onclick="filterGirls('Луганск')">Луганск</button>
        <button class="filter-btn" onclick="filterGirls('Стаханов')">Стаханов</button>
        <button class="filter-btn" onclick="filterGirls('Первомайск')">Первомайск</button>
      </div>
      <div class="grid" id="girlsGrid"></div>
    </div>

    <div id="chatSection" style="display:none;">
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
          <button class="btn" style="width:auto;" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

    <div id="adminSection" class="admin-panel">
      <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchAdminTab('girls-tab')">Анкеты</button>
        <button class="tab-btn" onclick="switchAdminTab('chats-tab')">Чаты</button>
      </div>
      <div id="girls-tab" class="admin-tab-content">
        <div class="modal-content" style="margin:0 auto; max-width:600px;">
          <h3>Добавить/Редактировать</h3>
          <input type="hidden" id="editGirlId">
          <div class="form-group"><label>Имя</label><input class="form-control" id="admName"></div>
          <div class="form-group"><label>Город</label><select class="form-control" id="admCity"><option>Луганск</option><option>Стаханов</option><option>Первомайск</option></select></div>
          <div class="form-group"><label>Возраст</label><input type="number" class="form-control" id="admAge"></div>
          <div class="form-group"><label>Рост</label><input type="number" class="form-control" id="admHeight"></div>
          <div class="form-group"><label>Вес</label><input type="number" class="form-control" id="admWeight"></div>
          <div class="form-group"><label>Грудь</label><input class="form-control" id="admBreast"></div>
          <div class="form-group"><label>Описание</label><textarea class="form-control" id="admDesc"></textarea></div>
          <div class="form-group"><label>Фото</label><input type="file" class="form-control" id="admPhotos" multiple accept="image/*"></div>
          <button class="btn" onclick="saveGirl()">Сохранить</button>
        </div>
        <h3 style="margin-top:2rem;">Список анкет</h3>
        <div id="adminGirlsList"></div>
      </div>
      <div id="chats-tab" class="admin-tab-content" style="display:none;">
        <h3>Активные чаты</h3>
        <div id="adminChatList"></div>
      </div>
    </div>
  </div>

  <div id="profileModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeProfile()">&times;</span><div id="profileContent"></div></div></div>
  <div id="adminChatModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
      <span class="close-modal" onclick="closeAdminChat()">&times;</span>
      <h3 id="adminChatTitle">Чат</h3>
      <div class="chat-container" style="height: 400px; margin-top:1rem;">
        <div class="chat-messages" id="adminChatMessages"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="adminChatInput" placeholder="Ответ оператора..." onkeypress="if(event.key==='Enter')sendAdminReply()">
          <button class="btn" style="width:auto;" onclick="sendAdminReply()">➤</button>
        </div>
      </div>
      <div style="margin-top:1rem; display:flex; gap:10px;">
        <button class="btn" style="background:#4CAF50;" onclick="completeAdminChat()">✅ Завершить</button>
        <button class="btn" style="background:#F44336;" onclick="clearAdminChat()">🗑️ Очистить</button>
      </div>
    </div>
  </div>
  <div id="ageModal" class="modal"><div class="modal-content"><h2>Вам есть 18 лет?</h2><p style="margin:1rem 0; color:#aaa;">Сайт содержит материалы для взрослых.</p><button class="btn age-btn yes" onclick="confirmAge()">Да, мне есть 18</button><button class="btn age-btn no" onclick="rejectAge()">Нет</button></div></div>

  <script>
    const API_URL = window.location.origin;
    let state = { user: null, token: localStorage.getItem('token'), girls: [], currentFilter: 'all', adminChatWith: null, adminChatsInterval: null, chatPollingInterval: null };

    async function initAuth() {
      if (state.token) {
        const userData = JSON.parse(localStorage.getItem('user'));
        if (userData) { state.user = userData; updateNav(); }
      }
      if (!localStorage.getItem('ageConfirmed')) document.getElementById('ageModal').classList.add('show');
    }
    function confirmAge() { localStorage.setItem('ageConfirmed', 'true'); document.getElementById('ageModal').classList.remove('show'); }
    function rejectAge() { window.location.href = 'https://google.com'; }

    async function login() {
      const username = prompt('Логин:'); const password = prompt('Пароль:');
      if (!username || !password) return;
      try {
        const res = await fetch(API_URL + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (res.ok) {
          state.token = data.token; state.user = data.user;
          localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user));
          updateNav(); showToast('Вход выполнен');
          if (data.user.role === 'admin') navigateTo('admin');
        } else showToast(data.message, 'error');
      } catch(e) { showToast('Ошибка сети', 'error'); }
    }
    function logout() { state.token = null; state.user = null; localStorage.removeItem('token'); localStorage.removeItem('user'); updateNav(); navigateTo('home'); }
    function toggleAuth() { if (state.user) logout(); else login(); }
    function updateNav() {
      document.getElementById('authBtn').style.display = state.user ? 'none' : 'inline-block';
      document.getElementById('logoutBtn').style.display = state.user ? 'inline-block' : 'none';
      document.getElementById('adminBtn').style.display = (state.user && state.user.role === 'admin') ? 'inline-block' : 'none';
    }

    function navigateTo(section) {
      document.getElementById('homeSection').style.display = 'none';
      document.getElementById('chatSection').style.display = 'none';
      document.getElementById('adminSection').classList.remove('active');
      if (section === 'home') { document.getElementById('homeSection').style.display = 'block'; loadGirls(); }
      else if (section === 'chat') {
        if (!state.user) { login(); return; }
        document.getElementById('chatSection').style.display = 'block';
        loadChatMessages(); startChatPolling();
      } else if (section === 'admin') {
        if (!state.user || state.user.role !== 'admin') { showToast('Доступ запрещен', 'error'); return; }
        document.getElementById('adminSection').classList.add('active');
        loadGirls(); loadAdminChats(); // КРИТИЧНО: Загрузка при входе
      }
    }

    async function loadGirls() {
      try {
        const res = await fetch(API_URL + '/api/girls');
        state.girls = await res.json();
        renderGirls();
        if (state.user && state.user.role === 'admin') renderAdminGirls();
      } catch(e) { console.error(e); }
    }
    function renderGirls() {
      const grid = document.getElementById('girlsGrid');
      const filtered = state.currentFilter === 'all' ? state.girls : state.girls.filter(g => g.city === state.currentFilter);
      grid.innerHTML = filtered.map(g => `
        <div class="card" onclick="openProfile('${g._id}')">
          <img src="${g.photos && g.photos[0] ? g.photos[0] : ''}" alt="${g.name}">
          <div class="card-body"><h3 class="card-title">${g.name}, ${g.age}</h3><p class="card-text">${g.desc}</p>
          <div class="tags"><span class="tag">${g.height} см</span><span class="tag">${g.weight} кг</span><span class="tag">${g.breast}</span></div>
          <button class="btn">Открыть анкету</button></div>
        </div>`).join('');
    }
    function filterGirls(city) { state.currentFilter = city; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderGirls(); }
    function openProfile(id) {
      const g = state.girls.find(x => x._id == id); if (!g) return;
      let galleryHtml = '';
      if (g.photos && g.photos.length > 1) galleryHtml = '<div class="profile-photo-gallery">' + g.photos.slice(1).map(p => `<img src="${p}" class="gallery-photo" onclick="showFullSize(this)">`).join('') + '</div>';
      document.getElementById('profileContent').innerHTML = `
        <img src="${g.photos && g.photos[0] ? g.photos[0] : ''}" class="profile-modal-img">${galleryHtml}
        <h2>${g.name}, ${g.age}</h2><p style="color:var(--primary); margin-bottom:1rem;">📍 ${g.city}</p><p>${g.desc}</p>
        <div class="profile-stat-grid">
          <div class="stat-item"><div class="stat-label">Рост</div><div class="stat-value">${g.height} см</div></div>
          <div class="stat-item"><div class="stat-label">Вес</div><div class="stat-value">${g.weight} кг</div></div>
          <div class="stat-item"><div class="stat-label">Грудь</div><div class="stat-value">${g.breast}</div></div>
          <div class="stat-item"><div class="stat-label">Возраст</div><div class="stat-value">${g.age} лет</div></div>
        </div><h4>Предпочтения:</h4><p style="margin-bottom:1rem; color:#ccc;">${g.prefs || 'Не указаны'}</p>
        <h4>Услуги:</h4><ul style="margin:1rem 0; padding-left:1.5rem; color:#ccc;">${(g.services||[]).map(s=>`<li>${s.name} — ${s.price}₽</li>`).join('')}</ul>
        <button class="btn" onclick="orderGirl('${g._id}')">Заказать</button>`;
      document.getElementById('profileModal').classList.add('show');
    }
    function closeProfile() { document.getElementById('profileModal').classList.remove('show'); }
    function showFullSize(img) { const m = document.createElement('div'); m.className = 'modal show'; m.style.background = 'rgba(0,0,0,0.95)'; m.onclick = () => m.remove(); m.innerHTML = `<img src="${img.src}" style="max-width:90%; max-height:90%;">`; document.body.appendChild(m); }
    function orderGirl(id) { closeProfile(); navigateTo('chat'); }

    // ADMIN GIRLS FIX
    function renderAdminGirls() {
      const list = document.getElementById('adminGirlsList');
      if (!list) return;
      console.log('renderAdminGirls called, count:', state.girls.length);
      if (state.girls.length === 0) { list.innerHTML = '<div class="empty-state">Анкет нет</div>'; return; }
      list.innerHTML = state.girls.map(g => `
        <div class="admin-list-item">
          <div class="item-info"><strong>${g.name}</strong> — ${g.city}<br><small>${g.height}см / ${g.weight}кг / ${g.age} лет</small></div>
          <div class="item-actions">
            <button class="btn-edit" onclick="editGirl('${g._id}')">✏️</button>
            <button class="btn-delete" onclick="deleteGirl('${g._id}')">🗑️</button>
          </div>
        </div>`).join('');
    }
    async function saveGirl() {
      const id = document.getElementById('editGirlId').value;
      const files = document.getElementById('admPhotos').files;
      let photoUrls = [];
      if (files.length > 0) {
        const formData = new FormData(); for (let f of files) formData.append('photos', f);
        const res = await fetch(API_URL + '/api/upload', { method: 'POST', headers: { 'Authorization': `Bearer ${state.token}` }, body: formData });
        const data = await res.json(); photoUrls = data.urls;
      }
      const girlData = { name: document.getElementById('admName').value, city: document.getElementById('admCity').value, age: document.getElementById('admAge').value, height: document.getElementById('admHeight').value, weight: document.getElementById('admWeight').value, breast: document.getElementById('admBreast').value, desc: document.getElementById('admDesc').value, photos: photoUrls.length ? photoUrls : (id ? state.girls.find(g=>g._id===id).photos : []) };
      await fetch(API_URL + '/api/girls', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token}` }, body: JSON.stringify({ action: id ? 'update' : 'add', girl: { ...girlData, _id: id } }) });
      showToast('Сохранено'); loadGirls(); document.getElementById('editGirlId').value = '';
    }
    function editGirl(id) { const g = state.girls.find(x => x._id == id); if (!g) return; document.getElementById('editGirlId').value = g._id; document.getElementById('admName').value = g.name; document.getElementById('admCity').value = g.city; document.getElementById('admAge').value = g.age; document.getElementById('admHeight').value = g.height; document.getElementById('admWeight').value = g.weight; document.getElementById('admBreast').value = g.breast; document.getElementById('admDesc').value = g.desc; window.scrollTo(0,0); }
    async function deleteGirl(id) { if (!confirm('Удалить?')) return; await fetch(API_URL + '/api/girls', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token}` }, body: JSON.stringify({ action: 'delete', girl: { _id: id } }) }); loadGirls(); }
    function switchAdminTab(tabId) {
      document.querySelectorAll('.admin-tab-content').forEach(t => t.style.display = 'none');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).style.display = 'block'; event.target.classList.add('active');
      if (tabId === 'girls-tab') loadGirls();
      if (tabId === 'chats-tab') loadAdminChats();
    }

    // CLIENT CHAT
    function startChatPolling() { if (state.chatPollingInterval) clearInterval(state.chatPollingInterval); state.chatPollingInterval = setInterval(() => { if (state.user && document.getElementById('chatSection').style.display === 'block') loadChatMessages(); }, 2000); }
    async function loadChatMessages() { if (!state.user) return; try { const res = await fetch(API_URL + '/api/chat', { headers: { 'Authorization': `Bearer ${state.token}` } }); const data = await res.json(); if (data.messages) renderMessages(data.messages); } catch(e) { console.error(e); } }
    function renderMessages(msgs) { const container = document.getElementById('chatMessages'); if (!container) return; container.innerHTML = msgs.map(m => { if (m.type === 'system') return `<div class="chat-msg system">${m.text}</div>`; const cls = m.type === 'user' ? 'user' : 'bot'; let text = m.text; if (m.type === 'bot' && m.text.includes('[Оператор]')) text = `<strong>👨‍💼 Оператор:</strong><br>${m.text.replace('[Оператор] ', '')}`; return `<div class="chat-msg ${cls}">${text}</div>`; }).join(''); container.scrollTop = container.scrollHeight; }
    async function sendMessage() { const input = document.getElementById('chatInput'); const text = input.value.trim(); if (!text) return; try { const res = await fetch(API_URL + '/api/chat/send', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token}` }, body: JSON.stringify({ text }) }); const data = await res.json(); if (data.messages) renderMessages(data.messages); input.value = ''; } catch(e) { showToast('Ошибка', 'error'); } }

    // ADMIN CHAT FIX
    async function loadAdminChats() {
      try {
        const res = await fetch(API_URL + '/api/admin/chats', { headers: { 'Authorization': `Bearer ${state.token}` } });
        const chats = await res.json();
        const list = document.getElementById('adminChatList'); if (!list) return;
        if (!chats || chats.length === 0) { list.innerHTML = '<div class="empty-state">Нет активных чатов</div>'; return; }
        list.innerHTML = chats.map(chat => {
          const lastMsg = chat.messages && chat.messages.length > 0 ? chat.messages[chat.messages.length - 1] : null;
          const preview = lastMsg ? (lastMsg.text || '').substring(0, 50) : 'Пустой чат';
          const statusClass = chat.waitingForOperator ? 'waiting' : 'active';
          const statusText = chat.waitingForOperator ? '⏳ Ждет' : '✅ Активен';
          return `<div class="chat-item ${chat.waitingForOperator ? 'new-message' : ''}" onclick="openAdminChat('${chat.userId}')"><div class="chat-item-header"><h4>👤 ${chat.userId}</h4><span class="status ${statusClass}">${statusText}</span></div><div class="chat-item-preview">${preview}</div></div>`;
        }).join('');
      } catch (e) { console.error('Load admin chats error:', e); }
    }

    window.loadAdminChat = (userId) => {
      console.log('📥 Loading chat history for:', userId);
      fetch(API_URL + `/api/admin/chat/${userId}`, { headers: { 'Authorization': `Bearer ${state.token}` } })
      .then(r => r.json())
      .then(chat => {
        console.log('✅ Received chat:', chat);
        console.log('Messages count:', chat.messages ? chat.messages.length : 0);
        const container = document.getElementById('adminChatMessages'); if (!container) return;
        container.innerHTML = '';
        if (!chat.messages || chat.messages.length === 0) { container.innerHTML = '<div class="empty-state">Чат пуст</div>'; return; }
        chat.messages.forEach((msg) => {
          const div = document.createElement('div'); div.className = `chat-msg ${msg.type}`;
          if (msg.type === 'user') { div.textContent = msg.text; div.style.alignSelf = 'flex-end'; div.style.background = 'rgba(103,58,183,0.25)'; }
          else if (msg.type === 'bot') {
            if (msg.text && msg.text.includes('[Оператор]')) { div.innerHTML = `<strong>👨‍💼 Оператор:</strong><br>${msg.text.replace('[Оператор] ', '')}`; div.style.alignSelf = 'flex-start'; div.style.background = 'rgba(76,175,80,0.2)'; }
            else { div.innerHTML = msg.text; div.style.alignSelf = 'flex-start'; }
          }
          else if (msg.type === 'system') { div.className = 'chat-msg system'; div.textContent = msg.text; div.style.alignSelf = 'center'; }
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
        console.log('✅ Chat rendered successfully');
      })
      .catch(error => { console.error('❌ Error loading chat:', error); });
    };

    let adminChatInterval = null;
    window.openAdminChat = (userId) => {
      console.log('🔔 Opening chat with:', userId);
      state.adminChatWith = userId;
      document.getElementById('adminChatTitle').textContent = '💬 Чат с ' + userId;
      document.getElementById('adminChatModal').classList.add('show');
      window.loadAdminChat(userId);
      if (adminChatInterval) clearInterval(adminChatInterval);
      adminChatInterval = setInterval(() => { window.loadAdminChat(userId); }, 3000);
    };
    window.closeAdminChat = () => { document.getElementById('adminChatModal').classList.remove('show'); state.adminChatWith = null; if (adminChatInterval) { clearInterval(adminChatInterval); adminChatInterval = null; } };
    window.sendAdminReply = async () => { const input = document.getElementById('adminChatInput'); const text = input ? input.value.trim() : ''; if (!text || !state.adminChatWith) { alert('Введите сообщение'); return; } try { await fetch(API_URL + '/api/admin/chat/reply', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.token}` }, body: JSON.stringify({ userId: state.adminChatWith, text: text }) }); if (input) input.value = ''; window.loadAdminChat(state.adminChatWith); window.loadAdminChats(); } catch (error) { console.error('Error sending reply:', error); alert('Ошибка'); } };
    window.completeAdminChat = async () => { if (!state.adminChatWith) return; if (!confirm('Завершить чат?')) return; try { await fetch(API_URL + `/api/admin/chat/${state.adminChatWith}/complete`, { method: 'PUT', headers: { 'Authorization': `Bearer ${state.token}` } }); showToast('Чат завершен'); closeAdminChat(); loadAdminChats(); } catch (e) { alert('Ошибка'); } };
    window.clearAdminChat = async () => { if (!state.adminChatWith) return; if (!confirm('ОЧИСТИТЬ ВСЮ ИСТОРИЮ?')) return; try { await fetch(API_URL + `/api/admin/chat/${state.adminChatWith}/clear`, { method: 'PUT', headers: { 'Authorization': `Bearer ${state.token}` } }); showToast('Чат очищен'); window.loadAdminChat(state.adminChatWith); loadAdminChats(); } catch (e) { alert('Ошибка'); } };

    function showToast(msg, type='success') { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; t.style.background = type === 'error' ? '#F44336' : '#333'; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    initAuth(); loadGirls();
  </script>
</body>
</html>
